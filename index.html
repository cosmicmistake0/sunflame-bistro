<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sunflame Bistro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Thasadith:ital,wght@0,400;0,700;1,400;1,700&display=swap"

    />

    <header>
      <nav>
        <div class="menu">
          <a href=""><img src="/icons/menu-svgrepo-com.svg" alt="" /> </a>
        </div>
        <div class="logo"><img src="/images/Sunflame Logo.png" alt="" /></div>
        <div class="cart">

          /></a>
        </div>
      </nav>
    </header>
    <main>
      <div class="hero">
        <div class="hero-image"><img src="images/Frame 5.png" alt="" /></div>
        <div class="hero-text-content">
          <h1>SunFlame Bistro</h1>
          <p>
            A place where good food, warm vibes, and local taste come together
            with a touch of global style. Take a look at our menu
          </p>
          <div class="cta">
            <button class="cta-green">See Menu</button>
            <button class="cta-gold">Book A Table</button>

        </div>
      </div>

    <footer></footer>
